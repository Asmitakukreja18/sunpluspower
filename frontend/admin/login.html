<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Admin Login | SunPlus Power Control Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="../assets/css/variables.css"/>
  <link rel="stylesheet" href="../assets/css/base.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
  <link rel="stylesheet" href="../assets/css/tailwind-compiled.css"/>

  <script src="../assets/js/api.js" defer></script>
  <script src="../assets/js/admin.js" defer></script>
  <script src="../assets/js/main.js" defer></script>
</head>
<body class="bg-gradient-to-br from-[#F4F6FA] via-[#E9EEF7] to-[#F4F6FA] text-gray-800 antialiased flex flex-col min-h-screen justify-between">

  <!-- Header -->
  <header class="w-full bg-white/70 backdrop-blur-2xl border-b border-white/60 py-3.5 shadow-md">
    <div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop max-w-[1440px] mx-auto">
      <div class="flex items-center gap-3">
        <a href="../index.html" class="flex items-center gap-3">
          <img alt="SunPlus Power Logo" class="h-9 w-auto object-contain" src="../assets/images/logo.png"/>
        </a>
        <span class="text-lg font-bold text-gray-800 tracking-wide">Control Panel</span>
      </div>
    </div>
  </header>

  <!-- Login Block -->
  <main class="flex-grow flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white/80 backdrop-blur-2xl border border-white/60 rounded-3xl p-8 shadow-2xl">
      <div class="text-center mb-8">
        <div class="inline-flex p-4 bg-[#e30613]/10 rounded-2xl mb-5">
          <span class="material-symbols-outlined text-[36px] text-[#e30613]">lock</span>
        </div>
        <h2 class="text-xl font-bold text-gray-900">Secure Console</h2>
        <p class="text-sm text-gray-500 mt-1">Authorized personnel only</p>
      </div>

      <div id="login-error-container"></div>

      <form id="admin-login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
          <input id="login-email" type="email" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#e30613]/30 focus:border-[#e30613] transition-all duration-200" placeholder="admin@sunpluspower.in" required/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
          <input id="login-password" type="password" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#e30613]/30 focus:border-[#e30613] transition-all duration-200" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-[#e30613] to-[#c00510] hover:from-[#c00510] hover:to-[#a00408] text-white font-semibold py-3.5 rounded-xl transition-all duration-200 shadow-lg hover:shadow-xl flex items-center justify-center gap-2 text-sm mt-2">
          Sign In <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
        </button>
      </form>
    </div>
  </main>

</body>
</html>
