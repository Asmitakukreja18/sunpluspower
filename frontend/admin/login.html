<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Admin Login | SunPlus Power Control Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="../assets/css/variables.css"/>
  <link rel="stylesheet" href="../assets/css/base.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
  <link rel="stylesheet" href="../assets/css/tailwind-compiled.css"/>

  <script src="../assets/js/api.js" defer></script>
  <script src="../assets/js/admin.js" defer></script>
  <script src="../assets/js/main.js" defer></script>
</head>
<body class="bg-gradient-to-br from-[#F4F6FA] via-[#E9EEF7] to-[#F4F6FA] admin-body text-gray-800 antialiased flex flex-col min-h-screen justify-between">

  <!-- Login Block -->
  <main class="flex-grow flex flex-col items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white border border-gray-100 rounded-2xl p-8 shadow-xl">
      <div class="text-center mb-8">
        <div class="inline-flex p-3.5 bg-primary/10 rounded-2xl mb-4">
          <img alt="SunPlus Power Logo" class="h-14 w-auto object-contain" src="../assets/images/logo.png"/>
        </div>
        <h2 class="text-xl font-bold text-gray-900">Welcome Back</h2>
        <p class="text-sm text-gray-500 mt-1">Sign in to access the Admin Console</p>
      </div>

      <div id="login-error-container"></div>

      <form id="admin-login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
          <input id="login-email" type="email" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 h-12 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/25 focus:border-primary transition-all duration-200" placeholder="admin@sunpluspower.in" required/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
          <input id="login-password" type="password" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 h-12 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/25 focus:border-primary transition-all duration-200" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold h-12 rounded-xl transition-all duration-200 shadow-lg hover:shadow-xl flex items-center justify-center gap-2 text-sm mt-2">
          Login to Dashboard <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
        </button>
      </form>
    </div>

    <p class="text-xs text-gray-400 mt-6 flex items-center gap-1.5">
      <span class="material-symbols-outlined text-[15px]">verified_user</span>
      Authorized personnel only &middot; Protected by JWT Authentication
    </p>
  </main>

</body>
</html>
