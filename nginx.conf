server {
    listen 80;
    server_name localhost;

    # Root directory for static frontend files
    root /usr/share/nginx/html;

    # Rewrite for assets under clean sub-paths (e.g. /company/assets/... -> /assets/...)
    rewrite ^.*/assets/(.*)$ /assets/$1 last;

    # Clean URL Rewrites for Public Routes
    
    # Company
    rewrite ^/company/about$ /about.html last;
    rewrite ^/company/leadership$ /about.html last;
    rewrite ^/company/capabilities$ /about.html last;
    rewrite ^/company/quality-safety$ /about.html last;
    rewrite ^/company/sustainability$ /about.html last;

    # Services
    rewrite ^/services$ /services.html last;
    rewrite ^/services/epc$ /services.html last;
    rewrite ^/services/operations-maintenance$ /services.html last;
    rewrite ^/services/installation-commissioning$ /services.html last;
    rewrite ^/services/project-management-consultancy$ /services.html last;
    rewrite ^/services/design-engineering$ /services.html last;
    rewrite ^/services/balance-of-system$ /services.html last;

    # Projects
    rewrite ^/projects$ /projects.html last;
    rewrite ^/projects/intelligence$ /projects.html last;
    rewrite ^/projects/manjari$ /project-detail.html last;
    rewrite ^/projects/achakdani$ /project-detail.html last;
    rewrite ^/projects/gherdi$ /project-detail.html last;
    rewrite ^/projects/watambare$ /project-detail.html last;
    rewrite ^/projects/ambora$ /project-detail.html last;
    rewrite ^/projects/kuhi$ /project-detail.html last;
    rewrite ^/projects/pachkhedi$ /project-detail.html last;
    rewrite ^/projects/asti$ /project-detail.html last;
    rewrite ^/projects/bhose$ /project-detail.html last;

    # Products
    rewrite ^/products$ /products.html last;
    rewrite ^/products/solar-modules$ /products.html last;
    rewrite ^/products/inverters$ /products.html last;
    rewrite ^/products/mounting-systems$ /products.html last;
    rewrite ^/products/balance-of-system$ /products.html last;
    rewrite ^/products/compare$ /products.html last;

    # Solar Intelligence
    rewrite ^/solar-intelligence$ /media.html last;
    rewrite ^/solar-intelligence/energy-model$ /media.html last;
    rewrite ^/solar-intelligence/methodology$ /media.html last;
    rewrite ^/solar-intelligence/before-after$ /media.html last;
    rewrite ^/solar-intelligence/financial-modeling$ /media.html last;

    # Media
    rewrite ^/media$ /media.html last;
    rewrite ^/media/insights$ /media.html last;
    rewrite ^/media/events$ /media.html last;
    rewrite ^/media/gallery$ /media.html last;

    # Careers
    rewrite ^/careers$ /careers.html last;
    rewrite ^/careers/jobs$ /careers.html last;
    rewrite ^/careers/life-at-sunplus$ /careers.html last;
    rewrite ^/careers/why-sunplus$ /careers.html last;
    rewrite ^/careers/apply$ /careers.html last;

    # Contact & Support Forms
    rewrite ^/contact$ /connect.html last;
    rewrite ^/distributorship$ /connect.html last;
    rewrite ^/warranty-registration$ /connect.html last;
    rewrite ^/complaints$ /connect.html last;

    # Search
    rewrite ^/search$ /index.html last;

    # Auth
    rewrite ^/login$ /admin/login.html last;
    rewrite ^/register$ /admin/login.html last;
    rewrite ^/forgot-password$ /admin/login.html last;

    # Calculator & Analysis Workspace
    rewrite ^/solar-calculator$ /calculator.html last;
    rewrite ^/calculator/processing$ /calculator.html last;
    rewrite ^/analysis(/.*)?$ /calculator.html last;

    # Customer Dashboard
    rewrite ^/dashboard(/.*)?$ /dashboard.html last;

    location / {
        index index.html;
        try_files $uri $uri/ /404.html;
    }

    # Proxy API requests to FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Uploaded static files (e.g. resumes, support tickets photos)
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Custom 404 handler
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
