version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sunplus_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sunplus_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sunplus_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sunplus_backend_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sunplus_db
      - SECRET_KEY=1e7bde935a8bc34f9a0d8102d8479e0a294d1b8de09e20a06ef8bb213a863ff8
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - ADMIN_EMAIL=admin@sunpluspower.in
      - ADMIN_PASSWORD=SunplusAdmin2026!
      - SMTP_SERVER=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USERNAME=alerts@sunpluspower.in
      - SMTP_PASSWORD=yoursecretpasswordhere
      - SMTP_FROM=alerts@sunpluspower.in
      - ALLOWED_HOSTS=*
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    image: nginx:alpine
    container_name: sunplus_frontend_nginx
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  pgdata:
  uploads_data:
