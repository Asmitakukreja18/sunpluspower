services:
  - type: web
    name: sunplus-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sunplus-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        fromService:
          type: web
          name: sunplus-backend
          envVarKey: SECRET_KEY
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ADMIN_SEED_EMAIL
        value: admin@sunpluspower.in
      - key: ADMIN_SEED_PASSWORD
        value: SunplusAdmin2026!
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: sunplus-db
    databaseName: sunplus_db
    user: sunplus_user
    region: oregon
    plan: free
